name: Stock Monitor & Trading Bot

on:
  schedule:
    # 每天上午 9:15 和下午 2:00 台灣時間運行
    - cron: '15 1 * * 1-5' # 09:15 (UTC+8)
    - cron: '00 6 * * 1-5' # 14:00 (UTC+8)
  
  # 允許手動觸發
  workflow_dispatch:

jobs:
  stock-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase-py python-telegram-bot
      
      - name: Run stock monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/stock_monitor.py
      
      - name: Log execution
        run: echo "Stock monitoring completed at $(date)"
