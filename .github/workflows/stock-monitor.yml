name: Stock Monitor & Trading Bot

on:
  schedule:
    - cron: '15 1 * * *'
    - cron: '0 6 * * *' 
  workflow_dispatch:
    inputs:
      stocks_override:
        description: '臨時指定股票（逗號分隔，例如：2330,2454）留空則用stocks.txt'
        required: false
        default: ''

jobs:
  stock-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCKS_OVERRIDE: ${{ github.event.inputs.stocks_override }}
       
      - name: 失敗告警
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🚨 <b>開明體系 — 系統異常</b>%0A%0A時間: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') (台灣時間)%0ARun ID: ${{ github.run_id }}%0A%0A請至 GitHub Actions 查看詳情：%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" run: |
          python scripts/stock_monitor.py

      - name: Log execution
        run: echo "Stock monitoring completed at $(date)"
