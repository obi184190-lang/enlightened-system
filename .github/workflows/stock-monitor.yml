name: Stock Monitor & Trading Bot

on:
  schedule:
    - cron: '15 1 * * *'
    - cron: '0 6 * * *' 
  workflow_dispatch:
    inputs:
      stocks_override:
        description: '臨時指定股票（逗號分隔，例如：2330,2454）留空則用stocks.txt'
        required: false
        default: ''

jobs:
  stock-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCKS_OVERRIDE: ${{ github.event.inputs.stocks_override }}
       
        
       python scripts/stock_monitor.py
       
      - name: Log execution
      - name: 失敗告警
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MESSAGE="🚨 開明體系 系統異常%0A時間: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') 台灣時間%0A$RUN_URL"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MESSAGE}"
        run: echo "Stock monitoring completed at $(date)"
